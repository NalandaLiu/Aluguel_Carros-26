<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cadastro Cliente</title>
</head>
<body>

<h2>Cadastro de Cliente</h2>

<form th:action="@{/clientes/salvar}" th:object="${cliente}" method="post">

    <input type="hidden" th:field="*{id}" />

    Nome: <input type="text" th:field="*{nome}" /><br>
    Email: <input type="email" th:field="*{email}" /><br>
    CPF: <input type="text" th:field="*{cpf}" /><br>
    Senha: <input type="password" th:field="*{senha}" /><br>

    <button type="submit">Salvar</button>
</form>

<a href="/clientes">Voltar</a>

</body>
</html>
